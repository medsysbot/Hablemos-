<!DOCTYPE html><html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hablemos Experimental Estable</title>
  <style>
    :root {
      --bg: #06111f;
      --bg-soft: #0c2a4a;
      --text: #ffffff;
      --text-soft: #d8e3ee;
      --shadow: 0 12px 36px rgba(0, 0, 0, 0.28);
      --scan: rgba(53, 255, 195, 0.95);
      --candidate: rgba(255, 216, 58, 0.98);
    }* { box-sizing: border-box; }

html, body {
  margin: 0;
  min-height: 100%;
  font-family: "Segoe UI", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

body { min-height: 100vh; }
button { font: inherit; }
.hidden { display: none !important; }

.app {
  min-height: 100vh;
  width: 100%;
  overflow: hidden;
  background: radial-gradient(circle at center, var(--bg-soft) 0%, #020814 72%);
}

.screen {
  min-height: 100vh;
  width: 100%;
}

.splash {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.splash__container {
  text-align: center;
  position: relative;
  width: min(100%, 520px);
}

.logoGlow {
  position: absolute;
  width: min(84vw, 420px);
  height: min(84vw, 420px);
  background: radial-gradient(circle, rgba(80, 255, 180, 0.25) 0%, rgba(80, 255, 180, 0.12) 40%, transparent 70%);
  filter: blur(20px);
  top: max(-40px, -3vw);
  left: 50%;
  transform: translateX(-50%);
  z-index: 0;
  pointer-events: none;
}

.splash svg {
  width: min(84vw, 420px);
  max-width: 420px;
  position: relative;
  z-index: 2;
  filter: drop-shadow(0 0 20px rgba(80, 255, 180, 0.35));
}

.stroke {
  fill: none;
  stroke: url(#grad);
  stroke-width: 12;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.bubble { stroke-dasharray: 900; stroke-dashoffset: 900; animation: draw 1s ease forwards; }
.wave {
  opacity: 0;
  stroke-dasharray: 400;
  stroke-dashoffset: 400;
  animation: show .01s linear 1s forwards, draw .8s ease 1s forwards;
}
.spiral {
  opacity: 0;
  stroke-dasharray: 450;
  stroke-dashoffset: 450;
  animation: show .01s linear 1.8s forwards, draw .8s ease 1.8s forwards;
}

.title {
  margin-top: 22px;
  font-size: clamp(2.2rem, 6vw, 3.5rem);
  font-weight: 300;
  letter-spacing: -1px;
  color: white;
  opacity: 0;
  transform: translateY(15px);
  animation: titleIn .6s ease forwards;
  animation-delay: 2.6s;
}

.glowLine {
  width: min(58vw, 240px);
  height: 4px;
  margin: 14px auto 0;
  border-radius: 4px;
  background: linear-gradient(90deg, transparent, #35ffc3, #aaff40, #35ffc3, transparent);
  box-shadow: 0 0 8px #4cffbf, 0 0 18px #4cffbf, 0 0 28px #9cff47;
  opacity: 0;
  animation: lineIn .6s ease forwards;
  animation-delay: 2.8s;
}

.particle {
  position: absolute;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #dfff75;
  box-shadow: 0 0 10px #dfff75;
  animation: twinkle 3s infinite ease-in-out;
  pointer-events: none;
}

.p1 { top: -30px; left: 30px; }
.p2 { top: -10px; right: 20px; }
.p3 { top: 20px; left: -10px; }
.p4 { top: 40px; right: -10px; }
.p5 { top: 60px; left: 20px; }

.toastLayer {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 80;
  padding: 24px;
}

.toastBox {
  max-width: min(86vw, 560px);
  background: rgba(8, 18, 30, 0.94);
  color: #fff;
  border: 1px solid rgba(255, 255, 255, 0.14);
  border-radius: 22px;
  box-shadow: 0 12px 36px rgba(0, 0, 0, 0.32);
  padding: 18px 22px;
  text-align: center;
  font-size: clamp(1.1rem, 4.8vw, 1.6rem);
  line-height: 1.25;
  font-weight: 700;
}

.main {
  display: flex;
  justify-content: center;
  align-items: stretch;
  padding: 18px;
  background: linear-gradient(180deg, #07111d 0%, #0b1828 100%);
}

.layout {
  width: min(100%, 940px);
  min-height: calc(100vh - 36px);
  display: grid;
  grid-template-rows: auto auto auto 1fr auto;
  gap: 10px;
}

.menuTitle,
.confirmZone,
.message,
.decisionPanel {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
  padding: 10px;
}

.decisionButton {
  min-height: 74px;
  border-radius: 18px;
  border: 1px solid rgba(255, 255, 255, 0.12);
  color: var(--text);
  font-size: clamp(1.1rem, 3.4vw, 1.45rem);
  font-weight: 700;
  box-shadow: var(--shadow);
  background: linear-gradient(180deg, rgba(30, 46, 62, 0.98) 0%, rgba(14, 24, 35, 1) 100%);
}

.decisionButton--confirm {
  background: linear-gradient(180deg, #245a3d 0%, #163825 100%);
}

.decisionButton--delete {
  background: linear-gradient(180deg, #7a2525 0%, #491515 100%);
}

.decisionButton--active {
  border-color: var(--scan);
  box-shadow: 0 0 0 3px rgba(53, 255, 195, 0.22), var(--shadow);
  transform: scale(1.01);
}

.gridWrap {
  position: relative;
  min-height: 280px;
}

.gridScroller {
  max-height: min(64vh, 620px);
  overflow-y: auto;
  padding-right: 72px;
  scrollbar-width: thin;
  scrollbar-color: rgba(255, 255, 255, 0.22) transparent;
}

.gridScroller::-webkit-scrollbar { width: 8px; }
.gridScroller::-webkit-scrollbar-thumb {
  background: rgba(255, 255, 255, 0.22);
  border-radius: 8px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 16px;
  align-content: start;
}

.scrollButton {
  position: absolute;
  right: 8px;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  border: 1px solid rgba(255, 255, 255, 0.14);
  background: linear-gradient(180deg, rgba(30, 46, 62, 0.98) 0%, rgba(14, 24, 35, 1) 100%);
  color: var(--text);
  font-size: 1.6rem;
  font-weight: 700;
  box-shadow: var(--shadow);
  z-index: 5;
  opacity: 0.98;
}

.scrollButton--up { top: 8px; }
.scrollButton--down { bottom: 8px; }

.scrollButton--active {
  border-color: var(--scan);
  box-shadow: 0 0 0 3px rgba(53, 255, 195, 0.22), var(--shadow);
  transform: scale(1.03);
}

.action {
  min-height: 98px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 24px;
  color: var(--text);
  font-size: clamp(1.55rem, 4.4vw, 2.25rem);
  font-weight: 700;
  padding: 20px 16px;
  box-shadow: var(--shadow);
  transition: transform 120ms ease, border-color 120ms ease, box-shadow 120ms ease;
}

.action--yes { background: linear-gradient(180deg, #245a3d 0%, #163825 100%); }
.action--no { background: linear-gradient(180deg, #7a2525 0%, #491515 100%); }
.action--water { background: linear-gradient(180deg, #106b8e 0%, #0a4358 100%); }
.action--pain { background: linear-gradient(180deg, #7d4c00 0%, #4f2f00 100%); }
.action--bathroom { background: linear-gradient(180deg, #4550a6 0%, #2a316a 100%); }
.action--help { background: linear-gradient(180deg, #7a5d00 0%, #4b3900 100%); }
.action--back { background: linear-gradient(180deg, #3f4a57 0%, #29313b 100%); }

.action--scan {
  border-color: var(--scan);
  box-shadow: 0 0 0 3px rgba(53, 255, 195, 0.22), var(--shadow);
  transform: scale(1.01);
}

.action--candidate {
  border-color: var(--candidate);
  box-shadow: 0 0 0 3px rgba(255, 216, 58, 0.22), var(--shadow);
  transform: scale(1.01);
}

.cameraModal {
  position: fixed;
  inset: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: rgba(2, 8, 20, 0.84);
  backdrop-filter: blur(6px);
}

.cameraCard {
  width: min(100%, 420px);
  display: grid;
  gap: 12px;
  background: rgba(8, 18, 30, 0.96);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 24px;
  padding: 16px;
  box-shadow: var(--shadow);
}

.cameraCard__title {
  margin: 0;
  text-align: center;
  color: var(--text-soft);
  font-size: 1rem;
  font-weight: 600;
}

.cameraWrap {
  position: relative;
  width: 100%;
  aspect-ratio: 4 / 3;
  border-radius: 18px;
  overflow: hidden;
  background: #020814;
  border: 1px solid rgba(255, 255, 255, 0.08);
}

.cameraVideo {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transform: scaleX(-1);
  background: #020814;
}

.cameraCard__help {
  margin: 0;
  text-align: center;
  color: var(--text-soft);
  font-size: 0.95rem;
  line-height: 1.35;
}

.footer {
  text-align: center;
  color: rgba(255, 255, 255, 0.64);
  font-size: 0.95rem;
  padding-bottom: 4px;
}

@keyframes draw { to { stroke-dashoffset: 0; } }
@keyframes show { to { opacity: 1; } }
@keyframes titleIn { to { opacity: 1; transform: translateY(0); } }
@keyframes lineIn { to { opacity: 1; } }
@keyframes twinkle {
  0%, 100% { opacity: .2; transform: scale(.6); }
  50% { opacity: 1; transform: scale(1); }
}

@media (max-width: 640px) {
  .main { padding: 12px; }
  .layout { min-height: calc(100vh - 24px); gap: 8px; }
  .message { min-height: 92px; }
  .grid { gap: 10px; }
  .action { min-height: 88px; border-radius: 18px; }
  .confirmZone { min-height: 52px; font-size: 0.9rem; }
  .menuTitle { min-height: 46px; }
  .decisionPanel { grid-template-columns: 1fr; }
}
}

@media (max-width: 420px) {
  .splash { padding: 16px; }
  .stroke { stroke-width: 10; }
  .grid { grid-template-columns: 1fr; }
  .action { min-height: 88px; font-size: 1.5rem; }
  .cameraCard { padding: 14px; }
  .gridScroller { padding-right: 62px; }
}

  </style>
</head>
<body>
  <div class="app">
    <section id="splashScreen" class="screen splash" aria-label="Pantalla de inicio">
      <div class="splash__container">
        <div class="logoGlow"></div>
        <div class="particle p1"></div>
        <div class="particle p2"></div>
        <div class="particle p3"></div>
        <div class="particle p4"></div>
        <div class="particle p5"></div><svg viewBox="0 0 500 350" aria-hidden="true" focusable="false">
      <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#29e6c9"></stop>
          <stop offset="60%" stop-color="#9df545"></stop>
          <stop offset="100%" stop-color="#ffd83a"></stop>
        </linearGradient>
      </defs>
      <path class="stroke bubble" d="M70 180 C70 110 120 70 200 70 H300 C380 70 430 110 430 180 C430 250 380 290 300 290 H200 L150 320 L160 285 C110 270 70 235 70 180 Z"></path>
      <path class="stroke wave" d="M120 180 L150 180 L175 140 L210 220 L250 120 L290 220 L315 180"></path>
      <path class="stroke spiral" d="M320 180 C350 180 370 200 370 220 C370 245 350 260 325 260 C295 260 270 235 270 205 C270 170 300 145 335 145 C380 145 410 175 410 220"></path>
    </svg>

    <div class="title">Hablemos</div>
    <div class="glowLine"></div>
  </div>
</section>

<div id="toastLayer" class="toastLayer hidden" aria-live="polite" aria-atomic="true">
  <div id="toastBox" class="toastBox">Mensaje</div>
</div>

<main id="mainScreen" class="screen main hidden" aria-label="Pantalla principal">
  <div class="layout">
    <div id="menuTitle" class="menuTitle">Comunicación</div>

    <div id="confirmZone" class="confirmZone">Parpadeo largo activa. Si hay palabra, elige Confirmar o Borrar.</div>

    <section id="messagePanel" class="message" aria-live="polite" aria-atomic="true">
      <h1 id="messageText" class="message__text">Iniciando cámara y calibración</h1>
    </section>

    <section id="decisionPanel" class="decisionPanel hidden" aria-label="Confirmar o borrar selección">
      <button id="confirmDecisionButton" type="button" class="decisionButton decisionButton--confirm">Confirmar</button>
      <button id="deleteDecisionButton" type="button" class="decisionButton decisionButton--delete">Borrar</button>
    </section>

    <section class="gridWrap" aria-label="Opciones de comunicación">
      <button id="scrollUpButton" type="button" class="scrollButton scrollButton--up" aria-label="Subir">↑</button>
      <button id="scrollDownButton" type="button" class="scrollButton scrollButton--down" aria-label="Bajar">↓</button>

      <div id="gridScroller" class="gridScroller">
        <div id="actionsGrid" class="grid"></div>
      </div>
    </section>

    <div class="footer hidden"></div>
  </div>
</main>

<div id="cameraModal" class="cameraModal hidden" aria-label="Calibración de cámara">
  <div class="cameraCard">
    <p class="cameraCard__title">Mantén los ojos abiertos y el rostro centrado</p>
    <div class="cameraWrap">
      <video id="cameraVideo" class="cameraVideo" autoplay muted playsinline></video>
    </div>
    <p id="cameraHelpText" class="cameraCard__help">La cámara se cerrará sola cuando termine la calibración.</p>
  </div>
</div>

  </div>  <script>
    (function () {
      var splashScreen = document.getElementById('splashScreen');
      var mainScreen = document.getElementById('mainScreen');
      var menuTitle = document.getElementById('menuTitle');
      var confirmZone = document.getElementById('confirmZone');
      var messagePanel = document.getElementById('messagePanel');
      var messageText = document.getElementById('messageText');
      var decisionPanel = document.getElementById('decisionPanel');
      var confirmDecisionButton = document.getElementById('confirmDecisionButton');
      var deleteDecisionButton = document.getElementById('deleteDecisionButton');
      var scrollUpButton = document.getElementById('scrollUpButton');
      var scrollDownButton = document.getElementById('scrollDownButton');
      var gridScroller = document.getElementById('gridScroller');
      var actionsGrid = document.getElementById('actionsGrid');
      var cameraModal = document.getElementById('cameraModal');
      var cameraHelpText = document.getElementById('cameraHelpText');
      var cameraVideo = document.getElementById('cameraVideo');
      var toastLayer = document.getElementById('toastLayer');
      var toastBox = document.getElementById('toastBox');

      var toastTimer = null;
      var wakeLockSentinel = null;

      var menuConfig = {
        main: {
          title: 'Comunicación',
          items: [
            { key: 'yes', label: 'Sí', kind: 'speak', phrase: 'Sí', className: 'action--yes' },
            { key: 'no', label: 'No', kind: 'speak', phrase: 'No', className: 'action--no' },
            { key: 'water', label: 'Agua', kind: 'speak', phrase: 'Agua', className: 'action--water' },
            { key: 'pain', label: 'Dolor', kind: 'submenu', submenu: 'pain', className: 'action--pain' },
            { key: 'bathroom', label: 'Baño', kind: 'speak', phrase: 'Baño', className: 'action--bathroom' },
            { key: 'help', label: 'Ayuda', kind: 'speak', phrase: 'Ayuda', className: 'action--help' },
            { key: 'hello', label: 'Hola', kind: 'speak', phrase: 'Hola', className: 'action--water' },
            { key: 'bye', label: 'Chau', kind: 'speak', phrase: 'Chau', className: 'action--back' },
            { key: 'happy', label: 'Contento', kind: 'speak', phrase: 'Estoy contento', className: 'action--yes' },
            { key: 'sad', label: 'Triste', kind: 'speak', phrase: 'Estoy triste', className: 'action--no' },
            { key: 'hungry', label: 'Hambre', kind: 'speak', phrase: 'Tengo hambre', className: 'action--pain' },
            { key: 'cold', label: 'Frío', kind: 'speak', phrase: 'Tengo frío', className: 'action--bathroom' },
            { key: 'hot', label: 'Calor', kind: 'speak', phrase: 'Tengo calor', className: 'action--help' },
            { key: 'thanks', label: 'Gracias', kind: 'speak', phrase: 'Gracias', className: 'action--water' }
          ]
        },
        pain: {
          title: 'Dolor',
          items: [
            { key: 'pain-head', label: 'Cabeza', kind: 'speak', phrase: 'Dolor de cabeza', className: 'action--pain' },
            { key: 'pain-back', label: 'Espalda', kind: 'speak', phrase: 'Dolor de espalda', className: 'action--pain' },
            { key: 'pain-body', label: 'Cuerpo', kind: 'speak', phrase: 'Dolor de cuerpo', className: 'action--pain' },
            { key: 'pain-chest', label: 'Pecho', kind: 'speak', phrase: 'Dolor de pecho', className: 'action--pain' },
            { key: 'pain-legs', label: 'Piernas', kind: 'speak', phrase: 'Dolor de piernas', className: 'action--pain' },
            { key: 'pain-arms', label: 'Brazos', kind: 'speak', phrase: 'Dolor de brazos', className: 'action--pain' },
            { key: 'pain-back-main', label: 'Volver', kind: 'back', backTo: 'main', className: 'action--back' }
          ]
        }
      };

      var state = {
        SPLASH_DURATION_MS: 4000,
        DEFAULT_SCAN_INTERVAL_MS: 2200,
        ARROW_SCAN_INTERVAL_MS: 3600,
        POST_ARROW_HOLD_MS: 4200,
        LONG_BLINK_MS: 720,
        BLINK_THRESHOLD_FACTOR: 0.58,
        MIN_CLOSED_EYE_RATIO: 0.10,
        CALIBRATION_SAMPLES_REQUIRED: 40,
        CALIBRATION_STABLE_FRAMES_REQUIRED: 12,
        CALIBRATION_MAX_STEP_RATIO: 0.22,
        LOST_FACE_RESET_MS: 1200,
        RIGHT_EYE_OUTER: 33,
        RIGHT_EYE_INNER: 133,
        LEFT_EYE_OUTER: 263,
        LEFT_EYE_INNER: 362,
        RIGHT_EYE_TOP: 159,
        RIGHT_EYE_BOTTOM: 145,
        LEFT_EYE_TOP: 386,
        LEFT_EYE_BOTTOM: 374,
        FACE_LEFT: 234,
        FACE_RIGHT: 454,
        FACE_TOP: 10,
        FACE_BOTTOM: 152,
        hasSpeechSupport: 'speechSynthesis' in window,
        faceLandmarker: null,
        mediaStream: null,
        processing: false,
        lastVideoTime: -1,
        scanTimer: null,
        scanSequence: [],
        scanPosition: 0,
        currentMenu: 'main',
        currentItems: [],
        actionButtons: [],
        pendingAction: null,
        waitingDecision: false,
        blinkStartTime: 0,
        closedFrameCount: 0,
        openFrameCount: 0,
        blinkCooldownUntil: 0,
        calibrationSamples: [],
        calibrationStableFrames: 0,
        calibrationLastAcceptedRatio: null,
        baselineEyeOpenRatio: null,
        smoothedEyeOpenRatio: null,
        lastFaceSeenAt: 0
      };

      function showToast(message, durationMs) {
        if (!message) {
          return;
        }
        toastBox.textContent = message;
        toastLayer.classList.remove('hidden');
        if (toastTimer) {
          window.clearTimeout(toastTimer);
        }
        toastTimer = window.setTimeout(function () {
          toastLayer.classList.add('hidden');
        }, durationMs || 2200);
      }

      function setMessageNeutral(text) {
        messageText.textContent = text;
        messagePanel.classList.remove('message--candidate');
        messagePanel.classList.remove('message--confirm');
      }

      function setCandidateMessage(text) {
        messageText.textContent = text;
        messagePanel.classList.add('message--candidate');
        messagePanel.classList.remove('message--confirm');
      }

      function setConfirmedMessage(text) {
        messageText.textContent = text;
        messagePanel.classList.remove('message--candidate');
        messagePanel.classList.add('message--confirm');
      }

      function chooseSpanishVoice() {
        if (!state.hasSpeechSupport) {
          return null;
        }
        var voices = window.speechSynthesis.getVoices();
        for (var i = 0; i < voices.length; i += 1) {
          if (voices[i].lang && voices[i].lang.toLowerCase().indexOf('es') === 0) {
            return voices[i];
          }
        }
        return null;
      }

      function speakMessage(text) {
        if (!state.hasSpeechSupport) {
          return;
        }
        window.speechSynthesis.cancel();
        var utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'es-ES';
        utterance.rate = 0.9;
        utterance.pitch = 1;
        var voice = chooseSpanishVoice();
        if (voice) {
          utterance.voice = voice;
        }
        window.speechSynthesis.speak(utterance);
      }

      async function requestWakeLock() {
        try {
          if (!('wakeLock' in navigator)) {
            return;
          }
          wakeLockSentinel = await navigator.wakeLock.request('screen');
          wakeLockSentinel.addEventListener('release', function () {
            wakeLockSentinel = null;
          });
        } catch (error) {
          console.error(error);
        }
      }

      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'visible') {
          requestWakeLock();
        }
      });

      function updateScrollButtons() {
        var maxScroll = gridScroller.scrollHeight - gridScroller.clientHeight;
        scrollUpButton.disabled = gridScroller.scrollTop <= 4;
        scrollDownButton.disabled = gridScroller.scrollTop >= maxScroll - 4;
      }

      function buildScanSequence() {
        if (state.waitingDecision) {
          state.scanSequence = ['confirm', 'delete'];
        } else {
          state.scanSequence = ['up', 'down'];
          state.currentItems.forEach(function (_, index) {
            state.scanSequence.push('button:' + index);
          });
        }
        state.scanPosition = 0;
        scheduleNextScan();
      }

      function getCurrentScanTarget() {
        return state.scanSequence[state.scanPosition] || 'button:0';
      }

      function getCurrentScanDelay() {
        var current = getCurrentScanTarget();
        if (current === 'up' || current === 'down') {
          return state.ARROW_SCAN_INTERVAL_MS;
        }
        return state.DEFAULT_SCAN_INTERVAL_MS;
      }

      function scheduleNextScan(overrideDelay) {
        if (state.scanTimer) {
          window.clearTimeout(state.scanTimer);
        }
        state.scanTimer = window.setTimeout(function () {
          nextScanPosition();
          scheduleNextScan();
        }, overrideDelay || getCurrentScanDelay());
      }

      function paintScanTarget() {
        var current = getCurrentScanTarget();
        scrollUpButton.classList.toggle('scrollButton--active', !state.waitingDecision && current === 'up');
        scrollDownButton.classList.toggle('scrollButton--active', !state.waitingDecision && current === 'down');

        state.actionButtons.forEach(function (button, index) {
          var isCurrent = !state.waitingDecision && current === 'button:' + index;
          var isPending = state.waitingDecision && state.pendingAction && state.pendingAction.label === button.getAttribute('data-label');
          button.classList.toggle('action--scan', isCurrent);
          button.classList.toggle('action--candidate', isPending);
        });

        confirmDecisionButton.classList.toggle('decisionButton--active', state.waitingDecision && current === 'confirm');
        deleteDecisionButton.classList.toggle('decisionButton--active', state.waitingDecision && current === 'delete');
      }

      function nextScanPosition() {
        state.scanPosition = (state.scanPosition + 1) % state.scanSequence.length;
        paintScanTarget();
      }

      function showDecisionPanel(show) {
        decisionPanel.classList.toggle('hidden', !show);
        confirmZone.textContent = show
          ? 'La palabra quedó escrita. El barrido recorre Confirmar y Borrar.'
          : 'Parpadeo largo activa el elemento marcado. Si una palabra queda escrita, el barrido pasa a Confirmar y Borrar.';
      }

      function renderMenu(menuName) {
        var menu = menuConfig[menuName];
        state.currentMenu = menuName;
        state.currentItems = menu.items.slice();
        menuTitle.textContent = menu.title;
        actionsGrid.innerHTML = '';

        state.currentItems.forEach(function (item, index) {
          var button = document.createElement('button');
          button.type = 'button';
          button.className = 'action ' + item.className;
          button.textContent = item.label;
          button.setAttribute('data-label', item.label);
          button.addEventListener('click', function () {
            preparePendingAction(index);
          });
          actionsGrid.appendChild(button);
        });

        state.actionButtons = Array.prototype.slice.call(actionsGrid.querySelectorAll('.action'));
        state.pendingAction = null;
        state.waitingDecision = false;
        showDecisionPanel(false);
        buildScanSequence();
        paintScanTarget();
        updateScrollButtons();

        if (menuName === 'pain') {
          setMessageNeutral('Selecciona tipo de dolor');
          showToast('Submenú de dolor', 1600);
        } else {
          setMessageNeutral('Espera el barrido');
        }
      }

      function preparePendingAction(index) {
        var item = state.currentItems[index];
        if (!item) {
          return;
        }
        state.pendingAction = item;
        state.waitingDecision = true;
        showDecisionPanel(true);
        setCandidateMessage(item.kind === 'speak' ? item.phrase : item.label);
        buildScanSequence();
        paintScanTarget();
        showToast('Ahora elige Confirmar o Borrar', 1800);
      }

      function clearPendingSelection() {
        state.pendingAction = null;
        state.waitingDecision = false;
        showDecisionPanel(false);
        buildScanSequence();
        paintScanTarget();
        setMessageNeutral(state.currentMenu === 'pain' ? 'Selecciona tipo de dolor' : 'Espera el barrido');
        showToast('Selección borrada', 1500);
      }

      function executePendingAction() {
        if (!state.pendingAction) {
          return;
        }

        var action = state.pendingAction;
        state.pendingAction = null;
        state.waitingDecision = false;
        showDecisionPanel(false);
        buildScanSequence();
        paintScanTarget();

        if (action.kind === 'submenu') {
          renderMenu(action.submenu);
          return;
        }

        if (action.kind === 'back') {
          renderMenu(action.backTo || 'main');
          showToast('Volviendo', 1400);
          return;
        }

        setConfirmedMessage(action.phrase);
        speakMessage(action.phrase);
        showToast('Palabra confirmada', 1600);
      }

      function activateCurrentTarget() {
        var current = getCurrentScanTarget();

        if (!state.waitingDecision && current === 'up') {
          gridScroller.scrollBy({ top: -220, left: 0, behavior: 'smooth' });
          showToast('Subiendo', 1000);
          scheduleNextScan(state.POST_ARROW_HOLD_MS);
          return;
        }

        if (!state.waitingDecision && current === 'down') {
          gridScroller.scrollBy({ top: 220, left: 0, behavior: 'smooth' });
          showToast('Bajando', 1000);
          scheduleNextScan(state.POST_ARROW_HOLD_MS);
          return;
        }

        if (!state.waitingDecision && current.indexOf('button:') === 0) {
          preparePendingAction(Number(current.split(':')[1]));
          return;
        }

        if (state.waitingDecision && current === 'confirm') {
          executePendingAction();
          return;
        }

        if (state.waitingDecision && current === 'delete') {
          clearPendingSelection();
        }
      }

      function averageEyeRatio(landmarks) {
        var rightOuter = landmarks[state.RIGHT_EYE_OUTER];
        var rightInner = landmarks[state.RIGHT_EYE_INNER];
        var leftOuter = landmarks[state.LEFT_EYE_OUTER];
        var leftInner = landmarks[state.LEFT_EYE_INNER];
        var rightTop = landmarks[state.RIGHT_EYE_TOP];
        var rightBottom = landmarks[state.RIGHT_EYE_BOTTOM];
        var leftTop = landmarks[state.LEFT_EYE_TOP];
        var leftBottom = landmarks[state.LEFT_EYE_BOTTOM];

        var rightEyeWidth = Math.max(Math.abs(rightInner.x - rightOuter.x), 0.0001);
        var leftEyeWidth = Math.max(Math.abs(leftInner.x - leftOuter.x), 0.0001);
        var rightEyeHeight = Math.max(Math.abs(rightBottom.y - rightTop.y), 0.0001);
        var leftEyeHeight = Math.max(Math.abs(leftBottom.y - leftTop.y), 0.0001);

        return ((rightEyeHeight / rightEyeWidth) + (leftEyeHeight / leftEyeWidth)) / 2;
      }

      function faceQuality(landmarks) {
        var left = landmarks[state.FACE_LEFT];
        var right = landmarks[state.FACE_RIGHT];
        var top = landmarks[state.FACE_TOP];
        var bottom = landmarks[state.FACE_BOTTOM];

        var faceWidth = Math.abs(right.x - left.x);
        var faceHeight = Math.abs(bottom.y - top.y);
        var centerX = (left.x + right.x) / 2;
        var centerY = (top.y + bottom.y) / 2;

        if (faceWidth < 0.16 || faceHeight < 0.18) {
          return { ok: false, message: 'Acércate un poco' };
        }
        if (faceWidth > 0.70 || faceHeight > 0.78) {
          return { ok: false, message: 'Aléjate un poco' };
        }
        if (centerX < 0.30 || centerX > 0.70 || centerY < 0.24 || centerY > 0.76) {
          return { ok: false, message: 'Centra el rostro' };
        }
        return { ok: true, message: 'Rostro correcto' };
      }

      function finishCalibration() {
        var sorted = state.calibrationSamples.slice().sort(function (a, b) { return a - b; });
        var trimCount = Math.floor(sorted.length * 0.15);
        var usable = sorted.slice(trimCount, sorted.length - trimCount);
        if (!usable.length) {
          usable = sorted;
        }
        var total = usable.reduce(function (sum, value) { return sum + value; }, 0);
        state.baselineEyeOpenRatio = total / usable.length;
        state.calibrationSamples = [];
        state.calibrationStableFrames = 0;
        state.calibrationLastAcceptedRatio = null;
        state.smoothedEyeOpenRatio = state.baselineEyeOpenRatio;
        cameraModal.classList.add('hidden');
        showToast('Calibración completa', 1700);
        setMessageNeutral('Espera el barrido');
      }

      function resetCalibrationCapture(helpText) {
        state.calibrationSamples = [];
        state.calibrationStableFrames = 0;
        state.calibrationLastAcceptedRatio = null;
        cameraHelpText.textContent = helpText;
      }

      function collectCalibrationSample(eyeRatio, quality) {
        if (!quality.ok) {
          resetCalibrationCapture(quality.message);
          return;
        }

        if (eyeRatio <= state.MIN_CLOSED_EYE_RATIO) {
          resetCalibrationCapture('Mantén los ojos abiertos');
          return;
        }

        if (state.calibrationLastAcceptedRatio !== null) {
          var maxAllowedDelta = state.calibrationLastAcceptedRatio * state.CALIBRATION_MAX_STEP_RATIO;
          if (Math.abs(eyeRatio - state.calibrationLastAcceptedRatio) > maxAllowedDelta) {
            resetCalibrationCapture('No te muevas. Reajustando calibración');
            return;
          }
        }

        state.calibrationStableFrames += 1;
        cameraHelpText.textContent = 'Rostro correcto. Mantén la posición unos segundos.';

        if (state.calibrationStableFrames < state.CALIBRATION_STABLE_FRAMES_REQUIRED) {
          return;
        }

        state.calibrationSamples.push(eyeRatio);
        state.calibrationLastAcceptedRatio = eyeRatio;
        cameraHelpText.textContent = 'Calibrando ' + state.calibrationSamples.length + ' de ' + state.CALIBRATION_SAMPLES_REQUIRED;
      }

      function updateBlink(eyeRatio, now) {
        if (state.baselineEyeOpenRatio === null) {
          return;
        }

        if (state.smoothedEyeOpenRatio === null) {
          state.smoothedEyeOpenRatio = eyeRatio;
        } else {
          state.smoothedEyeOpenRatio = state.smoothedEyeOpenRatio * 0.82 + eyeRatio * 0.18;
        }

        var closedThreshold = Math.max(state.MIN_CLOSED_EYE_RATIO, state.baselineEyeOpenRatio * state.BLINK_THRESHOLD_FACTOR);
        var closedNow = state.smoothedEyeOpenRatio <= closedThreshold;

        if (closedNow) {
          state.closedFrameCount += 1;
          state.openFrameCount = 0;
          if (state.closedFrameCount >= 2 && !state.blinkStartTime) {
            state.blinkStartTime = now;
          }
          if (state.blinkStartTime) {
            var closedDuration = now - state.blinkStartTime;
            if (now >= state.blinkCooldownUntil && closedDuration >= state.LONG_BLINK_MS) {
              activateCurrentTarget();
              state.blinkCooldownUntil = now + 1200;
              state.blinkStartTime = 0;
              state.closedFrameCount = 0;
            }
          }
          return;
        }

        state.openFrameCount += 1;
        state.closedFrameCount = 0;
        if (state.openFrameCount >= 2 && state.blinkStartTime) {
          state.blinkStartTime = 0;
        }
      }

      function handleNoFace(now) {
        if (now - state.lastFaceSeenAt > state.LOST_FACE_RESET_MS) {
          cameraHelpText.textContent = state.baselineEyeOpenRatio === null ? 'No se detecta rostro. Colócate frente a la cámara.' : 'Rostro perdido. Ajusta posición y luz.';
        }
      }

      async function ensureFaceLandmarker() {
        if (state.faceLandmarker) {
          return state.faceLandmarker;
        }

        var module = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest');
        var vision = module.default || module;
        var FilesetResolver = vision.FilesetResolver;
        var FaceLandmarker = vision.FaceLandmarker;

        var visionFileset = await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm');
        state.faceLandmarker = await FaceLandmarker.createFromOptions(visionFileset, {
          baseOptions: {
            modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task'
          },
          runningMode: 'VIDEO',
          numFaces: 1,
          minFaceDetectionConfidence: 0.6,
          minFacePresenceConfidence: 0.6,
          minTrackingConfidence: 0.6
        });

        return state.faceLandmarker;
      }

      async function autoStartCamera() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          showToast('Cámara no disponible', 2200);
          return;
        }

        cameraModal.classList.remove('hidden');
        showToast('Solicitando cámara', 1400);

        try {
          state.mediaStream = await navigator.mediaDevices.getUserMedia({
            audio: false,
            video: {
              facingMode: { ideal: 'user' },
              width: { ideal: 640 },
              height: { ideal: 480 }
            }
          });

          cameraVideo.srcObject = state.mediaStream;
          await cameraVideo.play();
          await ensureFaceLandmarker();
          cameraHelpText.textContent = 'Mantén los ojos abiertos y el rostro centrado.';
          state.calibrationSamples = [];
          state.calibrationStableFrames = 0;
          state.calibrationLastAcceptedRatio = null;
          state.processing = true;
          state.lastVideoTime = -1;
          state.lastFaceSeenAt = performance.now();
          processVideoFrame();
        } catch (error) {
          console.error(error);
          cameraModal.classList.add('hidden');
          showToast('No se pudo iniciar la cámara', 2200);
        }
      }

      function processVideoFrame() {
        if (!state.processing || !state.faceLandmarker) {
          return;
        }

        var now = performance.now();
        if (cameraVideo.readyState < 2) {
          window.requestAnimationFrame(processVideoFrame);
          return;
        }
        if (cameraVideo.currentTime === state.lastVideoTime) {
          window.requestAnimationFrame(processVideoFrame);
          return;
        }

        state.lastVideoTime = cameraVideo.currentTime;
        var result = state.faceLandmarker.detectForVideo(cameraVideo, now);
        var landmarks = result.faceLandmarks && result.faceLandmarks[0] ? result.faceLandmarks[0] : null;

        if (!landmarks) {
          handleNoFace(now);
          window.requestAnimationFrame(processVideoFrame);
          return;
        }

        state.lastFaceSeenAt = now;
        var quality = faceQuality(landmarks);
        var eyeRatio = averageEyeRatio(landmarks);

        if (state.baselineEyeOpenRatio === null) {
          collectCalibrationSample(eyeRatio, quality);
          if (state.calibrationSamples.length >= state.CALIBRATION_SAMPLES_REQUIRED) {
            finishCalibration();
          }
          window.requestAnimationFrame(processVideoFrame);
          return;
        }

        updateBlink(eyeRatio, now);
        window.requestAnimationFrame(processVideoFrame);
      }

      function showMainScreen() {
        splashScreen.classList.add('hidden');
        mainScreen.classList.remove('hidden');
        renderMenu('main');
        scheduleNextScan();
        updateScrollButtons();
        requestWakeLock();
        autoStartCamera();
      }

      confirmDecisionButton.addEventListener('click', function () {
        if (state.waitingDecision) {
          executePendingAction();
        }
      });

      deleteDecisionButton.addEventListener('click', function () {
        if (state.waitingDecision) {
          clearPendingSelection();
        }
      });

      scrollUpButton.addEventListener('click', function () {
        gridScroller.scrollBy({ top: -220, left: 0, behavior: 'smooth' });
        showToast('Subiendo', 1000);
        scheduleNextScan(state.POST_ARROW_HOLD_MS);
      });

      scrollDownButton.addEventListener('click', function () {
        gridScroller.scrollBy({ top: 220, left: 0, behavior: 'smooth' });
        showToast('Bajando', 1000);
        scheduleNextScan(state.POST_ARROW_HOLD_MS);
      });

      gridScroller.addEventListener('scroll', updateScrollButtons);
      window.addEventListener('resize', updateScrollButtons);

      window.setTimeout(showMainScreen, state.SPLASH_DURATION_MS);
    })();
  </script></body>
</html>
