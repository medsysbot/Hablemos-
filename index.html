<!DOCTYPE html><html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hablemos</title>
  <style>
    :root {
      --bg: #06111f;
      --bg-soft: #0c2a4a;
      --text: #ffffff;
      --text-soft: #d8e3ee;
      --shadow: 0 12px 36px rgba(0, 0, 0, 0.28);
      --scan: rgba(53, 255, 195, 0.95);
      --candidate: rgba(255, 216, 58, 0.98);
      --panel: linear-gradient(180deg, rgba(16, 30, 46, 0.96) 0%, rgba(10, 20, 32, 0.98) 100%);
    }* { box-sizing: border-box; }

html, body {
  margin: 0;
  min-height: 100%;
  font-family: "Segoe UI", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

body { min-height: 100vh; }
button { font: inherit; }
.hidden { display: none !important; }

.app {
  min-height: 100vh;
  width: 100%;
  overflow: hidden;
  background: radial-gradient(circle at center, var(--bg-soft) 0%, #020814 72%);
}

.screen {
  min-height: 100vh;
  width: 100%;
}

.splash {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.splash__container {
  text-align: center;
  position: relative;
  width: min(100%, 520px);
}

.logoGlow {
  position: absolute;
  width: min(84vw, 420px);
  height: min(84vw, 420px);
  background: radial-gradient(circle, rgba(80, 255, 180, 0.25) 0%, rgba(80, 255, 180, 0.12) 40%, transparent 70%);
  filter: blur(20px);
  top: max(-40px, -3vw);
  left: 50%;
  transform: translateX(-50%);
  z-index: 0;
  pointer-events: none;
}

.splash svg {
  width: min(84vw, 420px);
  max-width: 420px;
  position: relative;
  z-index: 2;
  filter: drop-shadow(0 0 20px rgba(80, 255, 180, 0.35));
}

.stroke {
  fill: none;
  stroke: url(#grad);
  stroke-width: 12;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.bubble { stroke-dasharray: 900; stroke-dashoffset: 900; animation: draw 1s ease forwards; }
.wave {
  opacity: 0;
  stroke-dasharray: 400;
  stroke-dashoffset: 400;
  animation: show .01s linear 1s forwards, draw .8s ease 1s forwards;
}
.spiral {
  opacity: 0;
  stroke-dasharray: 450;
  stroke-dashoffset: 450;
  animation: show .01s linear 1.8s forwards, draw .8s ease 1.8s forwards;
}

.title {
  margin-top: 22px;
  font-size: clamp(2.2rem, 6vw, 3.5rem);
  font-weight: 300;
  letter-spacing: -1px;
  color: white;
  opacity: 0;
  transform: translateY(15px);
  animation: titleIn .6s ease forwards;
  animation-delay: 2.6s;
}

.glowLine {
  width: min(58vw, 240px);
  height: 4px;
  margin: 14px auto 0;
  border-radius: 4px;
  background: linear-gradient(90deg, transparent, #35ffc3, #aaff40, #35ffc3, transparent);
  box-shadow: 0 0 8px #4cffbf, 0 0 18px #4cffbf, 0 0 28px #9cff47;
  opacity: 0;
  animation: lineIn .6s ease forwards;
  animation-delay: 2.8s;
}

.particle {
  position: absolute;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #dfff75;
  box-shadow: 0 0 10px #dfff75;
  animation: twinkle 3s infinite ease-in-out;
  pointer-events: none;
}

.p1 { top: -30px; left: 30px; }
.p2 { top: -10px; right: 20px; }
.p3 { top: 20px; left: -10px; }
.p4 { top: 40px; right: -10px; }
.p5 { top: 60px; left: 20px; }

.toastLayer {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 80;
  padding: 24px;
}

.toastBox {
  max-width: min(86vw, 560px);
  background: rgba(8, 18, 30, 0.94);
  color: #fff;
  border: 1px solid rgba(255, 255, 255, 0.14);
  border-radius: 22px;
  box-shadow: 0 12px 36px rgba(0, 0, 0, 0.32);
  padding: 18px 22px;
  text-align: center;
  font-size: clamp(1.1rem, 4.8vw, 1.6rem);
  line-height: 1.25;
  font-weight: 700;
}

.main {
  display: flex;
  justify-content: center;
  align-items: stretch;
  padding: 12px;
  background: linear-gradient(180deg, #07111d 0%, #0b1828 100%);
}

.layout {
  width: 100%;
  max-width: 1100px;
  min-height: calc(100vh - 24px);
  display: grid;
  grid-template-rows: auto auto auto auto 1fr;
  gap: 8px;
}

.menuTitle,
.confirmZone,
.message,
.decisionPanel,
.controlsPanel,
.arrowButton {
  border-radius: 18px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(255, 255, 255, 0.08);
  background: var(--panel);
}

.menuTitle {
  min-height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 8px 12px;
  color: var(--text);
  font-size: clamp(1rem, 2.8vw, 1.4rem);
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.confirmZone {
  min-height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 8px 10px;
  color: var(--text-soft);
  font-size: clamp(0.82rem, 2.1vw, 0.96rem);
  line-height: 1.15;
}

.confirmZone__text {
  width: 100%;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  line-clamp: 2;
}

.message {
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  min-height: 82px;
  padding: 10px 14px;
}

.message__text {
  margin: 0;
  width: 100%;
  font-size: clamp(1.2rem, 4.8vw, 2rem);
  line-height: 1.06;
  font-weight: 700;
  letter-spacing: -0.02em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.message--candidate {
  border-color: rgba(255, 216, 58, 0.42);
  box-shadow: 0 0 0 3px rgba(255, 216, 58, 0.12), var(--shadow);
}

.message--confirm {
  border-color: rgba(255, 255, 255, 0.36);
  box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.1), var(--shadow);
}

.decisionPanel {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
  padding: 10px;
}

.decisionButton {
  min-height: 72px;
  border-radius: 18px;
  border: 1px solid rgba(255, 255, 255, 0.12);
  color: var(--text);
  font-size: clamp(1.05rem, 3.4vw, 1.35rem);
  font-weight: 700;
  box-shadow: var(--shadow);
  background: linear-gradient(180deg, rgba(30, 46, 62, 0.98) 0%, rgba(14, 24, 35, 1) 100%);
}

.decisionButton--confirm { background: linear-gradient(180deg, #245a3d 0%, #163825 100%); }
.decisionButton--delete { background: linear-gradient(180deg, #7a2525 0%, #491515 100%); }

.decisionButton--active {
  border-color: var(--scan);
  box-shadow: 0 0 0 3px rgba(53, 255, 195, 0.22), var(--shadow);
  transform: scale(1.01);
}

.controlsPanel {
  padding: 8px;
  display: grid;
  grid-template-rows: auto 1fr auto;
  gap: 8px;
}

.arrowWrap {
  display: flex;
  justify-content: center;
  align-items: center;
}

.arrowButton {
  width: min(100%, 240px);
  min-height: 78px;
  border-radius: 22px;
  border: 1px solid rgba(255, 255, 255, 0.12);
  color: var(--text);
  font-size: clamp(1.7rem, 7vw, 2.5rem);
  font-weight: 700;
  background: linear-gradient(180deg, rgba(30, 46, 62, 0.98) 0%, rgba(14, 24, 35, 1) 100%);
}

.arrowButton--active {
  border-color: var(--scan);
  box-shadow: 0 0 0 3px rgba(53, 255, 195, 0.22), var(--shadow);
  transform: scale(1.01);
}

.gridScroller {
  max-height: min(58vh, 680px);
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(255, 255, 255, 0.22) transparent;
  padding: 0 2px;
}

.gridScroller::-webkit-scrollbar { width: 8px; }
.gridScroller::-webkit-scrollbar-thumb {
  background: rgba(255, 255, 255, 0.22);
  border-radius: 8px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
  width: 100%;
  max-width: 760px;
  margin: 0 auto;
  align-content: start;
}

.action {
  min-height: 92px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 22px;
  color: var(--text);
  font-size: clamp(1.25rem, 4.2vw, 1.95rem);
  font-weight: 700;
  padding: 16px 12px;
  box-shadow: var(--shadow);
  transition: transform 120ms ease, border-color 120ms ease, box-shadow 120ms ease;
}

.action--yes { background: linear-gradient(180deg, #245a3d 0%, #163825 100%); }
.action--no { background: linear-gradient(180deg, #7a2525 0%, #491515 100%); }
.action--water { background: linear-gradient(180deg, #106b8e 0%, #0a4358 100%); }
.action--pain { background: linear-gradient(180deg, #7d4c00 0%, #4f2f00 100%); }
.action--bathroom { background: linear-gradient(180deg, #4550a6 0%, #2a316a 100%); }
.action--help { background: linear-gradient(180deg, #7a5d00 0%, #4b3900 100%); }
.action--back { background: linear-gradient(180deg, #3f4a57 0%, #29313b 100%); }

.action--scan {
  border-color: var(--scan);
  box-shadow: 0 0 0 3px rgba(53, 255, 195, 0.22), var(--shadow);
  transform: scale(1.01);
}

.action--candidate {
  border-color: var(--candidate);
  box-shadow: 0 0 0 3px rgba(255, 216, 58, 0.22), var(--shadow);
  transform: scale(1.01);
}

.cameraModal {
  position: fixed;
  inset: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  background: rgba(2, 8, 20, 0.88);
  backdrop-filter: blur(6px);
}

.cameraCard {
  width: min(100%, 460px);
  display: grid;
  gap: 12px;
  background: rgba(8, 18, 30, 0.98);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 24px;
  padding: 16px;
  box-shadow: var(--shadow);
}

.cameraCard__title {
  margin: 0;
  text-align: center;
  color: var(--text-soft);
  font-size: 1rem;
  font-weight: 700;
}

.cameraWrap {
  position: relative;
  width: 100%;
  aspect-ratio: 4 / 3;
  border-radius: 18px;
  overflow: hidden;
  background: #020814;
  border: 1px solid rgba(255, 255, 255, 0.08);
}

.cameraVideo {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transform: scaleX(-1);
  background: #020814;
}

.cameraCard__help {
  margin: 0;
  text-align: center;
  color: var(--text-soft);
  font-size: 0.95rem;
  line-height: 1.3;
  min-height: 2.6em;
}

.retryButton {
  min-height: 62px;
  border-radius: 18px;
  border: 1px solid rgba(255, 255, 255, 0.12);
  color: var(--text);
  font-size: 1.05rem;
  font-weight: 700;
  background: linear-gradient(180deg, #3f4a57 0%, #29313b 100%);
  box-shadow: var(--shadow);
}

.footer { display: none; }

@keyframes draw { to { stroke-dashoffset: 0; } }
@keyframes show { to { opacity: 1; } }
@keyframes titleIn { to { opacity: 1; transform: translateY(0); } }
@keyframes lineIn { to { opacity: 1; } }
@keyframes twinkle {
  0%, 100% { opacity: .2; transform: scale(.6); }
  50% { opacity: 1; transform: scale(1); }
}

@media (max-width: 640px) {
  .main { padding: 10px; }
  .layout { min-height: calc(100vh - 20px); gap: 7px; }
  .menuTitle { min-height: 40px; font-size: 1rem; }
  .confirmZone { min-height: 48px; }
  .message { min-height: 74px; }
  .message__text { font-size: clamp(1.05rem, 4.2vw, 1.6rem); }
  .controlsPanel { gap: 6px; padding: 6px; }
  .arrowButton { min-height: 72px; }
  .action { min-height: 84px; font-size: 1.2rem; }
  .decisionPanel { grid-template-columns: 1fr; }
}

@media (max-width: 420px) {
  .grid { gap: 8px; }
  .action { min-height: 80px; font-size: 1.15rem; }
  .confirmZone { font-size: 0.8rem; }
  .arrowButton { width: 100%; }
}

  </style>
</head>
<body>
  <div class="app">
    <section id="splashScreen" class="screen splash" aria-label="Pantalla de inicio">
      <div class="splash__container">
        <div class="logoGlow"></div>
        <div class="particle p1"></div>
        <div class="particle p2"></div>
        <div class="particle p3"></div>
        <div class="particle p4"></div>
        <div class="particle p5"></div><svg viewBox="0 0 500 350" aria-hidden="true" focusable="false">
      <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#29e6c9"></stop>
          <stop offset="60%" stop-color="#9df545"></stop>
          <stop offset="100%" stop-color="#ffd83a"></stop>
        </linearGradient>
      </defs>
      <path class="stroke bubble" d="M70 180 C70 110 120 70 200 70 H300 C380 70 430 110 430 180 C430 250 380 290 300 290 H200 L150 320 L160 285 C110 270 70 235 70 180 Z"></path>
      <path class="stroke wave" d="M120 180 L150 180 L175 140 L210 220 L250 120 L290 220 L315 180"></path>
      <path class="stroke spiral" d="M320 180 C350 180 370 200 370 220 C370 245 350 260 325 260 C295 260 270 235 270 205 C270 170 300 145 335 145 C380 145 410 175 410 220"></path>
    </svg>

    <div class="title">Hablemos</div>
    <div class="glowLine"></div>
  </div>
</section>

<div id="toastLayer" class="toastLayer hidden" aria-live="polite" aria-atomic="true">
  <div id="toastBox" class="toastBox">Mensaje</div>
</div>

<main id="mainScreen" class="screen main hidden" aria-label="Pantalla principal">
  <div class="layout">
    <div id="menuTitle" class="menuTitle">Comunicación</div>

    <div id="confirmZone" class="confirmZone"><span class="confirmZone__text">Parpadeo largo activa. Si hay palabra escrita, el barrido pasa a Confirmar o Borrar.</span></div>

    <section id="messagePanel" class="message" aria-live="polite" aria-atomic="true">
      <h1 id="messageText" class="message__text">Iniciando cámara</h1>
    </section>

    <section id="decisionPanel" class="decisionPanel hidden" aria-label="Confirmar o borrar selección">
      <button id="confirmDecisionButton" type="button" class="decisionButton decisionButton--confirm">Confirmar</button>
      <button id="deleteDecisionButton" type="button" class="decisionButton decisionButton--delete">Borrar</button>
    </section>

    <section class="controlsPanel" aria-label="Opciones de comunicación">
      <div class="arrowWrap">
        <button id="scrollUpButton" type="button" class="arrowButton" aria-label="Bajar">↓</button>
      </div>

      <div id="gridScroller" class="gridScroller">
        <div id="actionsGrid" class="grid"></div>
      </div>

      <div class="arrowWrap">
        <button id="scrollDownButton" type="button" class="arrowButton" aria-label="Subir">↑</button>
      </div>
    </section>
  </div>
</main>

<div id="cameraModal" class="cameraModal hidden" aria-label="Calibración de cámara">
  <div class="cameraCard">
    <p class="cameraCard__title">Calibración de cámara</p>
    <div class="cameraWrap">
      <video id="cameraVideo" class="cameraVideo" autoplay muted playsinline></video>
    </div>
    <p id="cameraHelpText" class="cameraCard__help">Abriendo cámara...</p>
    <button id="retryCameraButton" type="button" class="retryButton hidden">Reintentar cámara</button>
  </div>
</div>

            { key: 'sit', label: 'Sentar', kind: 'speak', phrase: 'Quiero sentarme', className: 'action--yes' },
            { key: 'adjust', label: 'Acomodar', kind: 'speak', phrase: 'Quiero acomodarme', className: 'action--water' },
            { key: 'lift', label: 'Levantar', kind: 'speak', phrase: 'Quiero que me levanten', className: 'action--help' },
            { key: 'move-legs', label: 'Piernas', kind: 'speak', phrase: 'Quiero mover las piernas', className: 'action--pain' },
            { key: 'move-arms', label: 'Brazos', kind: 'speak', phrase: 'Quiero mover los brazos', className: 'action--pain' },
            { key: 'position-back-main', label: 'Volver', kind: 'back', backTo: 'main', className: 'action--back' }
          ]
        }
      };

      var state = {
        SPLASH_DURATION_MS: 4000,
        DEFAULT_SCAN_INTERVAL_MS: 2200,
        ARROW_SCAN_INTERVAL_MS: 3600,
        POST_ARROW_HOLD_MS: 4200,
        LONG_BLINK_MS: 720,
        BLINK_THRESHOLD_FACTOR: 0.58,
        MIN_CLOSED_EYE_RATIO: 0.10,
        CALIBRATION_SAMPLES_REQUIRED: 80,
        CALIBRATION_STABLE_FRAMES_REQUIRED: 24,
        CALIBRATION_MIN_DURATION_MS: 7000,
        CALIBRATION_MAX_STEP_RATIO: 0.10,
        CALIBRATION_MAX_SPREAD_RATIO: 0.15,
        LOST_FACE_RESET_MS: 1400,
        RIGHT_EYE_OUTER: 33,
        RIGHT_EYE_INNER: 133,
        LEFT_EYE_OUTER: 263,
        LEFT_EYE_INNER: 362,
        RIGHT_EYE_TOP: 159,
        RIGHT_EYE_BOTTOM: 145,
        LEFT_EYE_TOP: 386,
        LEFT_EYE_BOTTOM: 374,
        FACE_LEFT: 234,
        FACE_RIGHT: 454,
        FACE_TOP: 10,
        FACE_BOTTOM: 152,
        hasSpeechSupport: 'speechSynthesis' in window,
        faceLandmarker: null,
        mediaStream: null,
        processing: false,
        detectorReady: false,
        lastVideoTime: -1,
        scanTimer: null,
        scanSequence: [],
        scanPosition: 0,
        currentMenu: 'main',
        currentItems: [],
        actionButtons: [],
        pendingAction: null,
        waitingDecision: false,
        blinkStartTime: 0,
        closedFrameCount: 0,
        openFrameCount: 0,
        blinkCooldownUntil: 0,
        calibrationSamples: [],
        calibrationStableFrames: 0,
        calibrationLastAcceptedRatio: null,
        calibrationStartedAt: 0,
        baselineEyeOpenRatio: null,
        smoothedEyeOpenRatio: null,
        lastFaceSeenAt: 0
      };

      function showToast(message, durationMs) {
        if (!message) return;
        toastBox.textContent = message;
        toastLayer.classList.remove('hidden');
        if (toastTimer) {
          window.clearTimeout(toastTimer);
        }
        toastTimer = window.setTimeout(function () {
          toastLayer.classList.add('hidden');
        }, durationMs || 2200);
      }

      function setMessageNeutral(text) {
        messageText.textContent = text;
        messagePanel.classList.remove('message--candidate');
        messagePanel.classList.remove('message--confirm');
      }

      function setCandidateMessage(text) {
        messageText.textContent = text;
        messagePanel.classList.add('message--candidate');
        messagePanel.classList.remove('message--confirm');
      }

      function setConfirmedMessage(text) {
        messageText.textContent = text;
        messagePanel.classList.remove('message--candidate');
        messagePanel.classList.add('message--confirm');
      }

      function chooseSpanishVoice() {
        if (!state.hasSpeechSupport) return null;
        var voices = window.speechSynthesis.getVoices();
        for (var i = 0; i < voices.length; i += 1) {
          if (voices[i].lang && voices[i].lang.toLowerCase().indexOf('es') === 0) {
            return voices[i];
          }
        }
        return null;
      }

      function speakMessage(text) {
        if (!state.hasSpeechSupport) return;
        window.speechSynthesis.cancel();
        var utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'es-ES';
        utterance.rate = 0.9;
        utterance.pitch = 1;
        var voice = chooseSpanishVoice();
        if (voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
      }

      async function requestWakeLock() {
        try {
          if (!('wakeLock' in navigator)) return;
          wakeLockSentinel = await navigator.wakeLock.request('screen');
          wakeLockSentinel.addEventListener('release', function () {
            wakeLockSentinel = null;
          });
        } catch (error) {
          console.error(error);
        }
      }

      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'visible') {
          requestWakeLock();
        }
      });

      function updateArrowButtons() {
        var current = getCurrentScanTarget();
        scrollUpButton.classList.toggle('arrowButton--active', !state.waitingDecision && current === 'up');
        scrollDownButton.classList.toggle('arrowButton--active', !state.waitingDecision && current === 'down');
      }

      function updateDecisionButtons() {
        var current = getCurrentScanTarget();
        confirmDecisionButton.classList.toggle('decisionButton--active', state.waitingDecision && current === 'confirm');
        deleteDecisionButton.classList.toggle('decisionButton--active', state.waitingDecision && current === 'delete');
      }

      function paintScanTarget() {
        var current = getCurrentScanTarget();
        updateArrowButtons();
        updateDecisionButtons();
        state.actionButtons.forEach(function (button, index) {
          var isCurrent = !state.waitingDecision && current === 'button:' + index;
          var isPending = state.waitingDecision && state.pendingAction && state.pendingAction.label === button.getAttribute('data-label');
          button.classList.toggle('action--scan', isCurrent);
          button.classList.toggle('action--candidate', isPending);
        });
      }

      function buildScanSequence() {
        if (state.waitingDecision) {
          state.scanSequence = ['confirm', 'delete'];
        } else {
          state.scanSequence = ['up', 'down'];
          state.currentItems.forEach(function (_, index) {
            state.scanSequence.push('button:' + index);
          });
        }
        state.scanPosition = 0;
      }

      function getCurrentScanTarget() {
        return state.scanSequence[state.scanPosition] || 'button:0';
      }

      function getCurrentScanDelay() {
        var current = getCurrentScanTarget();
        if (current === 'up' || current === 'down') {
          return state.ARROW_SCAN_INTERVAL_MS;
        }
        return state.DEFAULT_SCAN_INTERVAL_MS;
      }

      function scheduleNextScan(overrideDelay) {
        if (state.scanTimer) {
          window.clearTimeout(state.scanTimer);
        }
        state.scanTimer = window.setTimeout(function () {
          state.scanPosition = (state.scanPosition + 1) % state.scanSequence.length;
          paintScanTarget();
          scheduleNextScan();
        }, overrideDelay || getCurrentScanDelay());
      }

      function showDecisionPanel(show) {
        decisionPanel.classList.toggle('hidden', !show);
        confirmZoneText.textContent = show
          ? 'La palabra quedó escrita. El barrido recorre Confirmar y Borrar.'
          : 'Parpadeo largo activa. Si hay palabra escrita, el barrido pasa a Confirmar o Borrar.';
      }

      function renderMenu(menuName) {
        var menu = menuConfig[menuName];
        state.currentMenu = menuName;
        state.currentItems = menu.items.slice();
        menuTitle.textContent = menu.title;
        actionsGrid.innerHTML = '';

        state.currentItems.forEach(function (item, index) {
          var button = document.createElement('button');
          button.type = 'button';
          button.className = 'action ' + item.className;
          button.textContent = item.label;
          button.setAttribute('data-label', item.label);
          button.addEventListener('click', function () {
            preparePendingAction(index);
          });
          actionsGrid.appendChild(button);
        });

        state.actionButtons = Array.prototype.slice.call(actionsGrid.querySelectorAll('.action'));
        state.pendingAction = null;
        state.waitingDecision = false;
        showDecisionPanel(false);
        buildScanSequence();
        paintScanTarget();
        scheduleNextScan();

        if (menuName === 'main') {
          setMessageNeutral('Espera el barrido');
        } else {
          setMessageNeutral('Selecciona una opción');
          showToast(menu.title, 1400);
        }
      }

      function preparePendingAction(index) {
        var item = state.currentItems[index];
        if (!item) return;
        state.pendingAction = item;
        state.waitingDecision = true;
        showDecisionPanel(true);
        setCandidateMessage(item.kind === 'speak' ? item.phrase : item.label);
        buildScanSequence();
        paintScanTarget();
        scheduleNextScan();
        showToast('Ahora elige Confirmar o Borrar', 1800);
      }

      function clearPendingSelection() {
        state.pendingAction = null;
        state.waitingDecision = false;
        showDecisionPanel(false);
        buildScanSequence();
        paintScanTarget();
        scheduleNextScan();
        setMessageNeutral(state.currentMenu === 'main' ? 'Espera el barrido' : 'Selecciona una opción');
        showToast('Selección borrada', 1500);
      }

      function executePendingAction() {
        if (!state.pendingAction) return;
        var action = state.pendingAction;
        state.pendingAction = null;
        state.waitingDecision = false;
        showDecisionPanel(false);
        buildScanSequence();
        paintScanTarget();
        scheduleNextScan();

        if (action.kind === 'submenu') {
          renderMenu(action.submenu);
          return;
        }

        if (action.kind === 'back') {
          renderMenu(action.backTo || 'main');
          showToast('Volviendo', 1300);
          return;
        }

        setConfirmedMessage(action.phrase);
        speakMessage(action.phrase);
        showToast('Palabra confirmada', 1500);
      }

      function activateCurrentTarget() {
        var current = getCurrentScanTarget();

        if (!state.waitingDecision && current === 'up') {
          gridScroller.scrollBy({ top: 220, left: 0, behavior: 'smooth' });
          showToast('Bajando', 900);
          scheduleNextScan(state.POST_ARROW_HOLD_MS);
          return;
        }

        if (!state.waitingDecision && current === 'down') {
          gridScroller.scrollBy({ top: -220, left: 0, behavior: 'smooth' });
          showToast('Subiendo', 900);
          scheduleNextScan(state.POST_ARROW_HOLD_MS);
          return;
        }

        if (!state.waitingDecision && current.indexOf('button:') === 0) {
          preparePendingAction(Number(current.split(':')[1]));
          return;
        }

        if (state.waitingDecision && current === 'confirm') {
          executePendingAction();
          return;
        }

        if (state.waitingDecision && current === 'delete') {
          clearPendingSelection();
        }
      }

      function averageEyeRatio(landmarks) {
        var rightOuter = landmarks[state.RIGHT_EYE_OUTER];
        var rightInner = landmarks[state.RIGHT_EYE_INNER];
        var leftOuter = landmarks[state.LEFT_EYE_OUTER];
        var leftInner = landmarks[state.LEFT_EYE_INNER];
        var rightTop = landmarks[state.RIGHT_EYE_TOP];
        var rightBottom = landmarks[state.RIGHT_EYE_BOTTOM];
        var leftTop = landmarks[state.LEFT_EYE_TOP];
        var leftBottom = landmarks[state.LEFT_EYE_BOTTOM];

        var rightEyeWidth = Math.max(Math.abs(rightInner.x - rightOuter.x), 0.0001);
        var leftEyeWidth = Math.max(Math.abs(leftInner.x - leftOuter.x), 0.0001);
        var rightEyeHeight = Math.max(Math.abs(rightBottom.y - rightTop.y), 0.0001);
        var leftEyeHeight = Math.max(Math.abs(leftBottom.y - leftTop.y), 0.0001);

        return ((rightEyeHeight / rightEyeWidth) + (leftEyeHeight / leftEyeWidth)) / 2;
      }

      function faceQuality(landmarks) {
        var left = landmarks[state.FACE_LEFT];
        var right = landmarks[state.FACE_RIGHT];
        var top = landmarks[state.FACE_TOP];
        var bottom = landmarks[state.FACE_BOTTOM];

        var faceWidth = Math.abs(right.x - left.x);
        var faceHeight = Math.abs(bottom.y - top.y);
        var centerX = (left.x + right.x) / 2;
        var centerY = (top.y + bottom.y) / 2;

        if (faceWidth < 0.17 || faceHeight < 0.19) {
          return { ok: false, message: 'Acércate un poco' };
        }
        if (faceWidth > 0.68 || faceHeight > 0.78) {
          return { ok: false, message: 'Aléjate un poco' };
        }
        if (centerX < 0.32 || centerX > 0.68 || centerY < 0.25 || centerY > 0.75) {
          return { ok: false, message: 'Centra el rostro' };
        }
        return { ok: true, message: 'Rostro correcto' };
      }

      function resetCalibration(helpText, hardReset) {
        state.calibrationStableFrames = 0;
        state.calibrationLastAcceptedRatio = null;
        if (hardReset) {
          state.calibrationSamples = [];
          state.calibrationStartedAt = 0;
        }
        cameraHelpText.textContent = helpText;
      }

      function collectCalibrationSample(eyeRatio, quality, now) {
        if (!quality.ok) {
          resetCalibration(quality.message, true);
          return;
        }

        if (eyeRatio <= state.MIN_CLOSED_EYE_RATIO) {
          resetCalibration('Mantén los ojos abiertos', false);
          return;
        }

        if (!state.calibrationStartedAt) {
          state.calibrationStartedAt = now;
        }

        if (state.calibrationLastAcceptedRatio !== null) {
          var maxAllowedDelta = Math.max(state.calibrationLastAcceptedRatio * state.CALIBRATION_MAX_STEP_RATIO, 0.006);
          if (Math.abs(eyeRatio - state.calibrationLastAcceptedRatio) > maxAllowedDelta) {
            resetCalibration('No te muevas. Reiniciando calibración', true);
            return;
          }
        }

        state.calibrationStableFrames += 1;
        if (state.calibrationStableFrames < state.CALIBRATION_STABLE_FRAMES_REQUIRED) {
          cameraHelpText.textContent = 'Rostro correcto. Mantén la posición ' + state.calibrationStableFrames + ' de ' + state.CALIBRATION_STABLE_FRAMES_REQUIRED;
          return;
        }

        state.calibrationSamples.push(eyeRatio);
        state.calibrationLastAcceptedRatio = eyeRatio;
        cameraHelpText.textContent = 'Calibrando ' + state.calibrationSamples.length + ' de ' + state.CALIBRATION_SAMPLES_REQUIRED;
      }

      function finishCalibration(now) {
        if (state.calibrationSamples.length < state.CALIBRATION_SAMPLES_REQUIRED) {
          return false;
        }
        if (!state.calibrationStartedAt || (now - state.calibrationStartedAt) < state.CALIBRATION_MIN_DURATION_MS) {
          cameraHelpText.textContent = 'Mantén la posición. Terminando calibración...';
          return false;
        }

        var sorted = state.calibrationSamples.slice().sort(function (a, b) { return a - b; });
        var trimCount = Math.floor(sorted.length * 0.15);
        var usable = sorted.slice(trimCount, sorted.length - trimCount);
        if (!usable.length) usable = sorted;

        var total = usable.reduce(function (sum, value) { return sum + value; }, 0);
        var baseline = total / usable.length;
        var spread = (usable[usable.length - 1] - usable[0]) / Math.max(baseline, 0.0001);

        if (spread > state.CALIBRATION_MAX_SPREAD_RATIO) {
          resetCalibration('Mucha variación. Recalibrando...', true);
          return false;
        }

        state.baselineEyeOpenRatio = baseline;
        state.calibrationSamples = [];
        state.calibrationStableFrames = 0;
        state.calibrationLastAcceptedRatio = null;
        state.calibrationStartedAt = 0;
        state.smoothedEyeOpenRatio = baseline;
        state.detectorReady = true;
        cameraModal.classList.add('hidden');
        retryCameraButton.classList.add('hidden');
        showToast('Calibración completa', 1700);
        setMessageNeutral('Espera el barrido');
        return true;
      }

      function updateBlink(eyeRatio, now) {
        if (state.baselineEyeOpenRatio === null) return;

        if (state.smoothedEyeOpenRatio === null) {
          state.smoothedEyeOpenRatio = eyeRatio;
        } else {
          state.smoothedEyeOpenRatio = state.smoothedEyeOpenRatio * 0.85 + eyeRatio * 0.15;
        }

        var closedThreshold = Math.max(state.MIN_CLOSED_EYE_RATIO, state.baselineEyeOpenRatio * state.BLINK_THRESHOLD_FACTOR);
        var closedNow = state.smoothedEyeOpenRatio <= closedThreshold;

        if (closedNow) {
          state.closedFrameCount += 1;
          state.openFrameCount = 0;
          if (state.closedFrameCount >= 2 && !state.blinkStartTime) {
            state.blinkStartTime = now;
          }
          if (state.blinkStartTime) {
            var closedDuration = now - state.blinkStartTime;
            if (now >= state.blinkCooldownUntil && closedDuration >= state.LONG_BLINK_MS) {
              activateCurrentTarget();
              state.blinkCooldownUntil = now + 1200;
              state.blinkStartTime = 0;
              state.closedFrameCount = 0;
            }
          }
          return;
        }

        state.openFrameCount += 1;
        state.closedFrameCount = 0;
        if (state.openFrameCount >= 2 && state.blinkStartTime) {
          state.blinkStartTime = 0;
        }
      }

      function handleNoFace(now) {
        if (now - state.lastFaceSeenAt > state.LOST_FACE_RESET_MS) {
          cameraHelpText.textContent = state.baselineEyeOpenRatio === null ? 'No se detecta rostro. Colócate frente a la cámara.' : 'Rostro perdido. Ajusta posición y luz.';
        }
      }

      async function loadMediapipeModule() {
        if (!mediapipeModulePromise) {
          mediapipeModulePromise = import(MEDIAPIPE_BUNDLE_URL);
        }
        var module = await mediapipeModulePromise;
        return module.default || module;
      }

      async function ensureFaceLandmarker() {
        if (state.faceLandmarker) {
          return state.faceLandmarker;
        }

        cameraHelpText.textContent = 'Cargando detector facial...';
        var vision = await loadMediapipeModule();
        var FilesetResolver = vision.FilesetResolver;
        var FaceLandmarker = vision.FaceLandmarker;

        if (!FilesetResolver || !FaceLandmarker) {
          throw new Error('El módulo MediaPipe no expuso FaceLandmarker');
        }

        var fileset = await FilesetResolver.forVisionTasks(MEDIAPIPE_WASM_URL);
        state.faceLandmarker = await FaceLandmarker.createFromOptions(fileset, {
          baseOptions: {
            modelAssetPath: FACE_LANDMARKER_MODEL_URL
          },
          runningMode: 'VIDEO',
          numFaces: 1,
          minFaceDetectionConfidence: 0.6,
          minFacePresenceConfidence: 0.6,
          minTrackingConfidence: 0.6
        });

        return state.faceLandmarker;
      }

      async function openCameraPreview(forceReopen) {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          throw new Error('Este navegador no permite cámara');
        }

        if (state.mediaStream && forceReopen) {
          state.mediaStream.getTracks().forEach(function (track) { track.stop(); });
          state.mediaStream = null;
        }

        if (!state.mediaStream) {
          state.mediaStream = await navigator.mediaDevices.getUserMedia({
            audio: false,
            video: {
              facingMode: { ideal: 'user' },
              width: { ideal: 640 },
              height: { ideal: 480 }
            }
          });
        }

        cameraVideo.srcObject = state.mediaStream;
        await cameraVideo.play();
      }

      async function startCalibrationFlow(forceCameraReopen) {
        cameraModal.classList.remove('hidden');
        retryCameraButton.classList.add('hidden');
        state.processing = false;
        state.detectorReady = false;
        state.baselineEyeOpenRatio = null;
        state.smoothedEyeOpenRatio = null;
        state.calibrationSamples = [];
        state.calibrationStableFrames = 0;
        state.calibrationLastAcceptedRatio = null;
        state.calibrationStartedAt = 0;
        state.lastVideoTime = -1;

        try {
          cameraHelpText.textContent = 'Abriendo cámara...';
          await openCameraPreview(forceCameraReopen);
          cameraHelpText.textContent = 'Cámara abierta. Preparando detector...';
          await ensureFaceLandmarker();
          cameraHelpText.textContent = 'Mantén los ojos abiertos y el rostro centrado.';
          state.processing = true;
          state.lastFaceSeenAt = performance.now();
          processVideoFrame();
        } catch (error) {
          console.error(error);
          state.processing = false;
          retryCameraButton.classList.remove('hidden');

          if (state.mediaStream) {
            cameraHelpText.textContent = 'La cámara abrió, pero falló el detector facial. Reintenta.';
            showToast('Falló el detector facial', 2200);
          } else {
            cameraHelpText.textContent = 'No se pudo abrir la cámara. Reintenta.';
            showToast('No se pudo abrir la cámara', 2200);
          }
        }
      }

      function processVideoFrame() {
        if (!state.processing || !state.faceLandmarker) return;

        var now = performance.now();
        if (cameraVideo.readyState < 2) {
          window.requestAnimationFrame(processVideoFrame);
          return;
        }
        if (cameraVideo.currentTime === state.lastVideoTime) {
          window.requestAnimationFrame(processVideoFrame);
          return;
        }

        state.lastVideoTime = cameraVideo.currentTime;

        try {
          var result = state.faceLandmarker.detectForVideo(cameraVideo, now);
          var landmarks = result.faceLandmarks && result.faceLandmarks[0] ? result.faceLandmarks[0] : null;

          if (!landmarks) {
            handleNoFace(now);
            window.requestAnimationFrame(processVideoFrame);
            return;
          }

          state.lastFaceSeenAt = now;
          var quality = faceQuality(landmarks);
          var eyeRatio = averageEyeRatio(landmarks);

          if (state.baselineEyeOpenRatio === null) {
            collectCalibrationSample(eyeRatio, quality, now);
            if (state.calibrationSamples.length >= state.CALIBRATION_SAMPLES_REQUIRED) {
              finishCalibration(now);
            }
            window.requestAnimationFrame(processVideoFrame);
            return;
          }

          updateBlink(eyeRatio, now);
          window.requestAnimationFrame(processVideoFrame);
        } catch (error) {
          console.error(error);
          state.processing = false;
          retryCameraButton.classList.remove('hidden');
          cameraHelpText.textContent = 'El detector falló durante la calibración. Reintenta.';
          showToast('Error en detector facial', 2200);
        }
      }

      function showMainScreen() {
        splashScreen.classList.add('hidden');
        mainScreen.classList.remove('hidden');
        renderMenu('main');
        requestWakeLock();
        startCalibrationFlow(true);
      }

      retryCameraButton.addEventListener('click', function () {
        startCalibrationFlow(false);
      });

      confirmDecisionButton.addEventListener('click', function () {
        if (state.waitingDecision) executePendingAction();
      });

      deleteDecisionButton.addEventListener('click', function () {
        if (state.waitingDecision) clearPendingSelection();
      });

      scrollUpButton.addEventListener('click', function () {
        gridScroller.scrollBy({ top: 220, left: 0, behavior: 'smooth' });
        showToast('Bajando', 1000);
        scheduleNextScan(state.POST_ARROW_HOLD_MS);
      });

      scrollDownButton.addEventListener('click', function () {
        gridScroller.scrollBy({ top: -220, left: 0, behavior: 'smooth' });
        showToast('Subiendo', 1000);
        scheduleNextScan(state.POST_ARROW_HOLD_MS);
      });

      window.setTimeout(showMainScreen, state.SPLASH_DURATION_MS);
    })();
  </script></body>
</html>
